<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{menu.orders}">Замовлення | BookStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5; --bg: #F3F4F6; --card: #FFFFFF;
            --text: #1F2937; --muted: #6B7280; --border: #E5E7EB;
        }
        [data-theme="dark"] {
            --bg: #111827; --card: #1F2937; --text: #F9FAFB; --muted: #9CA3AF; --border: #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; min-height: 100vh; transition: 0.3s; }

        /* Sidebar */
        .sidebar {
            width: 280px; background: var(--card); border-right: 1px solid var(--border);
            padding: 25px 0; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column;
        }
        .logo {
            font-size: 1.6rem; font-weight: 800; text-decoration: none; padding: 0 25px; margin-bottom: 40px;
            display: flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1.5px;
        }
        .nav-link {
            display: flex; align-items: center; gap: 15px; padding: 14px 25px;
            color: var(--muted); text-decoration: none; font-weight: 500; transition: 0.2s; border-left: 4px solid transparent;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--primary); background: rgba(79, 70, 229, 0.1); border-left-color: var(--primary);
        }

        /* Main Content */
        .main-content { flex: 1; padding: 40px 5%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }

        /* Search Bar */
        .search-container {
            display: flex; gap: 10px; margin-bottom: 25px; align-items: center;
        }
        .search-input {
            flex: 0 1 300px; padding: 12px 18px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .btn-search {
            background: var(--primary); color: white; border: none; padding: 12px 24px;
            border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn-reset {
            color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; margin-left: 5px;
        }

        /* Table Styling */
        .table-container {
            background: var(--card); border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: rgba(79, 70, 229, 0.05); text-align: left; padding: 18px 25px;
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
        }
        th a { text-decoration: none; color: inherit; display: flex; align-items: center; gap: 5px; }
        td { padding: 20px 25px; border-top: 1px solid var(--border); font-size: 0.95rem; }

        .status-badge {
            padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase;
        }
        .status-paid { background: rgba(16, 185, 129, 0.1); color: #10B981; }
        .status-shipped { background: rgba(59, 130, 246, 0.1); color: #3B82F6; }

        .btn-ship {
            background: var(--primary); color: white; border: none; padding: 8px 16px;
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 5px;
        }
        .btn-ship:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }

        .price { font-weight: 800; color: #10B981; }
    </style>
</head>
<body>

<div class="sidebar">
    <a th:href="@{/home}" class="logo">📚 BookStore</a>
    <nav>
        <a th:href="@{/home}" class="nav-link"><i>🏠</i> <span th:text="#{nav.home}">Головна</span></a>
        <a th:href="@{/books}" class="nav-link"><i>📖</i> <span th:text="#{menu.books}">Книги</span></a>
        <a th:href="@{/clients}" class="nav-link" sec:authorize="hasRole('EMPLOYEE')"><i>👥</i> <span th:text="#{menu.clients}">Клієнти</span></a>
        <a th:href="@{/employees}" class="nav-link" sec:authorize="hasRole('EMPLOYEE')"><i>👔</i> <span th:text="#{menu.employees}">Працівники</span></a>
        <a th:href="@{/orders/employee/{email}(email=${#authentication.name})}" class="nav-link active"><i>🛒</i> <span th:text="#{menu.orders}">Замовлення</span></a>
    </nav>
</div>

<div class="main-content">
    <div class="header">
        <h1 th:text="#{menu.orders}">Всі замовлення</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div style="display: flex; gap: 10px;">
                <a th:href="@{''(lang='uk')}" style="text-decoration: none; font-size: 1.3rem;">🇺🇦</a>
                <a th:href="@{''(lang='en')}" style="text-decoration: none; font-size: 1.3rem;">🇺🇸</a>
            </div>
            <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size: 1.4rem;">🌓</button>
        </div>
    </div>

    <form class="search-container" th:action="@{/orders/employee/{email}(email=${#authentication.name})}" method="get">
        <input type="text" name="search" th:value="${search}" class="search-input"
               th:placeholder="#{order.search.placeholder}">
        <button type="submit" class="btn-search" th:text="#{order.search.button}">Знайти</button>
        <a th:if="${search != null and !search.isEmpty()}"
           th:href="@{/orders/employee/{email}(email=${#authentication.name})}"
           class="btn-reset" th:text="#{order.search.reset}">Скинути</a>
    </form>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th th:text="#{order.number}"># Номер</th>
                <th th:text="#{order.date}">Дата</th>
                <th th:text="#{order.client}">Клієнт</th>
                <th th:text="#{order.items}">Товари</th>
                <th>
                    <a th:href="@{/orders/employee/{email}(email=${#authentication.name}, sortBy='price', sortDir=${sortBy == 'price' ? reverseSortDir : 'DESC'}, search=${search})}">
                        <span th:text="#{order.amount}">Сума</span>
                        <span th:if="${sortBy == 'price' and sortDir == 'DESC'}">▼</span>
                        <span th:if="${sortBy == 'price' and sortDir == 'ASC'}">▲</span>
                    </a>
                </th>
                <th th:text="#{order.status}">Статус</th>
                <th th:text="#{order.action}">Дія</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td style="font-weight: 600; color: var(--primary);" th:text="'#' + ${order.orderNumber}">#000000</td>
                <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">01.01.2026</td>
                <td th:text="${order.clientEmail}">client@mail.com</td>
                <td>
                    <div th:each="item : ${order.bookItems}" style="margin-bottom: 4px;">
                        <span th:text="${item.bookName}" style="font-weight: 500;">Назва</span>
                        <span style="color: var(--muted); font-size: 0.85rem;">(x<span th:text="${item.quantity}">1</span>)</span>
                    </div>
                </td>
                <td class="price" th:text="${order.price} + ' ₴'">0.00 ₴</td>
                <td>
                    <span th:class="'status-badge ' + (${order.status.name() == 'PAID'} ? 'status-paid' : 'status-shipped')"
                          th:text="${order.status.name() == 'PAID' ? #messages.msg('order.status.paid') : #messages.msg('order.status.shipped')}">
                    </span>
                </td>
                <td>
                    <form th:if="${order.status.name() == 'PAID'}" th:action="@{/orders/{id}/ship(id=${order.id})}" method="post">
                        <button type="submit" class="btn-ship">
                            🚀 <span th:text="#{order.button.ship}">Відправити</span>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const htmlElement = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    htmlElement.setAttribute('data-theme', savedTheme);

    themeToggle.addEventListener('click', () => {
        const currentTheme = htmlElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        htmlElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    });
</script>
</body>
</html>
