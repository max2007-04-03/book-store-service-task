<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? #{book.form.title.edit} : #{book.form.title.add}">BookStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #4F46E5; --bg-color: #F3F4F6; --card-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; --border-color: #D1D5DB; }
        [data-theme="dark"] { --bg-color: #111827; --card-bg: #1F2937; --text-main: #F9FAFB; --text-muted: #9CA3AF; --border-color: #374151; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); transition: 0.3s; min-height: 100vh; padding: 40px 5%; display: flex; justify-content: center; align-items: center; }

        .form-container { background: var(--card-bg); max-width: 600px; width: 100%; padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border: 1px solid var(--border-color); }
        h1 { font-size: 1.8rem; margin-bottom: 25px; text-align: center; color: var(--text-main); }

        .form-group { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }

        label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: var(--text-muted); }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-main);
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus { border-color: var(--primary-color); }
        input[readonly] { opacity: 0.7; cursor: not-allowed; }

        .btn-submit { background: var(--primary-color); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background: #4338CA; }
        .cancel-link { display: block; text-align: center; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .cancel-link:hover { color: var(--primary-color); }
        .error { color: #EF4444; font-size: 0.8rem; margin-top: 5px; display: block;}
    </style>
</head>
<body>

<div class="form-container">
    <h1 th:text="${isEdit} ? #{book.form.header.edit} : #{book.form.header.add}">Заголовок</h1>

    <form th:action="@{${isEdit ? '/books/' + book.name + '/update' : '/books'}}" th:object="${book}" method="post">
        <div class="form-grid">
            <div class="form-group full-width">
                <label th:text="#{book.form.label.name}">Назва *</label>
                <input type="text" th:field="*{name}" th:readonly="${isEdit}" th:placeholder="#{book.form.placeholder.name}">
                <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>

            <div class="form-group">
                <label th:text="#{book.form.label.author}">Автор *</label>
                <input type="text" th:field="*{author}" th:placeholder="#{book.form.placeholder.author}">
            </div>

            <div class="form-group">
                <label th:text="#{book.form.label.price}">Ціна *</label>
                <input type="number" step="0.01" min="0.01" th:field="*{price}">
                <span class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
            </div>

            <div class="form-group">
                <label th:text="#{book.form.label.genre}">Жанр</label>
                <input type="text" th:field="*{genre}" th:placeholder="#{book.form.placeholder.genre}">
            </div>

            <div class="form-group">
                <label th:text="#{book.form.label.pages}">Сторінки</label>
                <input type="number" min="1" th:field="*{pages}">
                <span class="error" th:if="${#fields.hasErrors('pages')}" th:errors="*{pages}"></span>
            </div>

            <div class="form-group">
                <label th:text="#{book.form.label.language}">Мова</label>
                <select th:field="*{language}">
                    <option value="UKRAINIAN" th:text="#{book.lang.uk}">Українська</option>
                    <option value="ENGLISH" th:text="#{book.lang.en}">Англійська</option>
                    <option value="OTHER" th:text="#{book.lang.other}">Інша</option>
                </select>
            </div>

            <div class="form-group">
                <label th:text="#{book.form.label.age_group}">Вікова група</label>
                <select th:field="*{ageGroup}">
                    <option value="ADULT" th:text="#{book.age.adult}">Дорослі</option>
                    <option value="TEEN" th:text="#{book.age.teen}">Підлітки</option>
                    <option value="CHILD" th:text="#{book.age.child}">Діти</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label th:text="#{book.form.label.stock}">Кількість на складі *</label>
                <input type="number" th:field="*{stockQuantity}" min="0" required>
                <span class="error" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></span>
            </div>

            <div class="form-group full-width">
                <label th:text="#{book.form.label.description}">Опис книги</label>
                <textarea th:field="*{description}" rows="4" th:placeholder="#{book.form.placeholder.description}"></textarea>
                <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>
        </div>

        <button type="submit" class="btn-submit" th:text="${isEdit} ? #{book.form.btn.update} : #{book.form.btn.save}"></button>
        <a th:href="@{/books}" class="cancel-link" th:text="#{book.form.btn.cancel}">Скасувати</a>
    </form>
</div>

<script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
</body>
</html>
