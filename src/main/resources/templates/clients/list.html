<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{client.list.title}">Список клієнтів | BookStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4F46E5; --bg-color: #F3F4F6; --card-bg: #FFFFFF;
            --text-main: #1F2937; --text-muted: #6B7280; --border-color: #E5E7EB; --sidebar-active: rgba(79, 70, 229, 0.1);
        }
        [data-theme="dark"] {
            --bg-color: #111827; --card-bg: #1F2937; --text-main: #F9FAFB; --text-muted: #9CA3AF; --border-color: #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); transition: 0.3s; min-height: 100vh; display: flex; }

        .sidebar { width: 280px; background: var(--card-bg); border-right: 1px solid var(--border-color); padding: 25px 0; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
        .logo { font-size: 1.6rem; font-weight: 800; text-decoration: none; padding: 0 25px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1.5px; }
        .nav-link { display: flex; align-items: center; gap: 15px; padding: 14px 25px; color: var(--text-muted); text-decoration: none; font-weight: 500; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-link:hover, .nav-link.active { color: var(--primary-color); background: var(--sidebar-active); border-left-color: var(--primary-color); }
        .nav-link i { font-style: normal; font-size: 1.2rem; }

        .main-content { flex: 1; padding: 40px 5%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        #theme-toggle { background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 10px; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border-color); transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary-color); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card h3 { color: var(--text-main); margin-bottom: 8px; font-weight: 700; }
        .balance-badge { display: inline-block; padding: 4px 12px; background: rgba(16, 185, 129, 0.1); color: #10B981; border-radius: 20px; font-weight: 700; margin-top: 10px; }

        .actions { display: flex; justify-content: space-between; margin-top: 20px; align-items: center; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .btn-details { color: var(--primary-color); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .btn-delete { background: #EF4444; color: white; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <a th:href="@{/home}" class="logo" style="margin-left: 25px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; font-weight: 800; text-decoration: none; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1.5px; font-size: 1.6rem;">
        <span style="-webkit-text-fill-color: initial;">📚</span> BookStore
    </a>

    <nav>
        <a th:href="@{/home}" class="nav-link"><i>🏠</i> <span th:text="#{nav.home}">Головна</span></a>
        <a th:href="@{/books}" class="nav-link"><i>📖</i> <span th:text="#{menu.books}">Книги</span></a>

        <a th:href="@{/clients}" class="nav-link active"><i>👥</i> <span th:text="#{menu.clients}">Клієнти</span></a>

        <a th:href="@{/employees}" class="nav-link"><i>👔</i> <span th:text="#{menu.employees}">Працівники</span></a>

        <a th:href="@{/orders/employee/{email}(email=${#authentication.name})}" class="nav-link"><i>🛒</i> <span th:text="#{menu.orders}">Всі Замовлення</span></a>
    </nav>
</div>

<div class="main-content">
    <div class="header">
        <h1 th:text="#{client.list.header}">Управління клієнтами</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div style="display: flex; gap: 8px;">
                <a th:href="@{/clients(lang='uk')}" style="text-decoration: none;">🇺🇦</a>
                <a th:href="@{/clients(lang='en')}" style="text-decoration: none;">🇺🇸</a>
            </div>
            <button id="theme-toggle">🌓</button>
        </div>
    </div>

    <div class="grid">
        <div th:each="client : ${clients}" class="card">
            <h3 th:text="${client.name}">Ім'я</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">📧 <span th:text="${client.email}">email</span></p>
            <div class="balance-badge" th:text="${client.balance} + ' ₴'">0 ₴</div>

            <div class="actions" sec:authorize="hasRole('EMPLOYEE')">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <a th:href="@{/clients/{email}(email=${client.email})}" class="btn-details" th:text="#{client.list.btn.details}">Деталі →</a>
                    <a th:href="@{/clients/{email}/cart(email=${client.email})}" class="btn-details" style="color: var(--primary-color);" th:text="#{client.list.btn.cart}">🛒 Кошик</a>
                </div>

                <form th:action="@{/clients/delete}" method="post"
                      th:data-confirm-msg="#{client.list.confirm_delete}"
                      onsubmit="return confirm(this.getAttribute('data-confirm-msg'))">
                    <input type="hidden" name="email" th:value="${client.email}">
                    <button type="submit" class="btn-delete" th:text="#{client.list.btn.delete}">Видалити</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const htmlElement = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    htmlElement.setAttribute('data-theme', savedTheme);

    themeToggle.addEventListener('click', () => {
        const currentTheme = htmlElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        htmlElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    });
</script>
</body>
</html>
