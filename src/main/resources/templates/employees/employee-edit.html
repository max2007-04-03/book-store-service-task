<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{employee.edit.title}">Редагувати профіль | BookStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10B981; --bg: #F3F4F6; --card: #FFFFFF; --text: #1F2937; --border: #D1D5DB; }

        /* Поддержка темной темы из твоего дизайна */
        [data-theme="dark"] { --bg: #111827; --card: #1F2937; --text: #F9FAFB; --border: #374151; }

        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px; transition: 0.3s; margin: 0;}
        .form-card { background: var(--card); padding: 40px; border-radius: 16px; width: 100%; max-width: 450px; border: 1px solid var(--border); box-shadow: 0 10px 15px rgba(0,0,0,0.1);}

        h2 { color: var(--text); font-weight: 600; }
        label { display: block; margin-top: 15px; font-size: 0.9rem; color: var(--text); opacity: 0.8; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; box-sizing: border-box; outline: none;}
        input:focus { border-color: var(--primary); }

        /* Стили для заблокированных полей */
        input[readonly] { opacity: 0.6; cursor: not-allowed; background: rgba(0,0,0,0.05); border-style: dashed; }
        [data-theme="dark"] input[readonly] { background: rgba(255,255,255,0.05); }

        .btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 25px; transition: 0.3s;}
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .cancel-link { display:block; text-align:center; margin-top:20px; color: var(--text); opacity: 0.6; text-decoration:none; font-size: 0.9rem; transition: 0.3s; }
        .cancel-link:hover { opacity: 1; color: var(--primary); }
    </style>
</head>
<body>
<div class="form-card">
    <h2 style="text-align: center; margin-bottom: 10px;" th:text="#{employee.edit.header}">Особисті дані</h2>
    <p style="text-align: center; font-size: 0.85rem; opacity: 0.7; margin-bottom: 25px;" th:text="#{employee.edit.subtitle}">Ви можете змінити лише контактну інформацію</p>

    <form th:action="@{/employees/{e}/update(e=${employee.email})}" th:object="${employee}" method="post">

        <label th:text="#{employee.label.name_readonly}">Ім'я (заборонено до зміни)</label>
        <input type="text" th:field="*{name}" readonly>

        <label th:text="#{employee.label.email_readonly}">Email (заборонено до зміни)</label>
        <input type="text" th:field="*{email}" readonly>

        <label th:text="#{employee.label.phone}">Телефон</label>
        <input type="text" th:field="*{phone}" placeholder="+380...">

        <label th:text="#{employee.label.birthday}">Дата народження</label>
        <input type="date" th:field="*{birthDate}">

        <button type="submit" class="btn" th:text="#{employee.btn.save}">Зберегти зміни</button>

        <a th:href="@{/employees}" class="cancel-link" th:text="#{employee.btn.cancel}">Скасувати</a>
    </form>
</div>
<script>
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
</body>
</html>
